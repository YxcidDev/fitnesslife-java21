server.port=${PORT}

spring.data.mongodb.uri=${MONGODB_URI}

spring.session.store-type=redis
spring.session.timeout=30m
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL}

epayco.customer-id=${EPAYCO_CUSTOMER_ID}
epayco.private-key=${EPAYCO_PRIVATE_KEY}
epayco.public-key=${EPAYCO_PUBLIC_KEY}
epayco.test-mode=${EPAYCO_TEST_MODE}
epayco.confirmation-url=${APP_URL}/payment/confirmation
epayco.response-url=${APP_URL}/payment/response