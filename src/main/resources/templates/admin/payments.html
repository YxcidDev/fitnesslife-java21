<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos</title>
    <link rel="icon" type="image/png" th:href="@{/img/icons/logo-fl.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin-table.css}">
</head>

<body>
    <th:block th:insert="~{fragments/navdashboard :: sidebar}"></th:block>

    <div class="main-content">
        <div class="container-fluid p-4">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <h1 class="page-title">Pagos</h1>

            <div class="table-container">
                <div class="card-body">

                    <div class="d-flex align-items-center mb-4 flex-wrap gap-3">
                        <form method="get" action="/admin/payments"
                            class="d-flex gap-2 flex-wrap align-items-center w-100">

                            <div class="position-relative search-input-wrapper">
                                <input type="text" name="search" class="form-control search-input"
                                    placeholder="Buscar por usuario, email, transacción..." th:value="${searchTerm}">
                            </div>

                            <select name="status" class="form-select filter-select">
                                <option value="">Todos los estados</option>
                                <option value="ACCEPTED" th:selected="${statusFilter == 'ACCEPTED'}">Aceptado</option>
                                <option value="PENDING" th:selected="${statusFilter == 'PENDING'}">Pendiente</option>
                                <option value="REJECTED" th:selected="${statusFilter == 'REJECTED'}">Rechazado</option>
                                <option value="FAILED" th:selected="${statusFilter == 'FAILED'}">Fallido</option>
                            </select>

                            <button type="submit" class="btn btn-filter">Filtrar</button>
                            <a th:href="@{/admin/payments}" class="btn btn-clear">Limpiar</a>
                        </form>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-users align-middle">
                            <thead>
                                <tr>
                                    <th>Usuario</th>
                                    <th>Plan</th>
                                    <th>Monto</th>
                                    <th>Estado</th>
                                    <th>Transacción</th>
                                    <th>Banco</th>
                                    <th>Validez</th>
                                    <th>Fecha registro</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="payment : ${payments}">
                                    <td>
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:unless="${payment.user.name != null and payment.user.photoProfile != null and !payment.user.photoProfile.isEmpty()}"
                                                th:src="'https://ui-avatars.com/api/?name=' + ${payment.user.name} + '+' + ${payment.user.lastname} + '&background=eb6608&color=fff&size=128'"
                                                alt="User Avatar" class="user-avatar">
                                            <div>
                                                <p class="mb-0 fw-bold user-name"
                                                    th:text="${payment.user.name} + ' ' + ${payment.user.lastname}"></p>
                                                <small class="text-muted" th:text="${payment.user.email}"></small>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span th:text="${payment.plan.planName}"></span>
                                        <br />
                                        <small class="text-muted">
                                            <span th:text="${payment.plan.durationDays}"></span> días
                                        </small>
                                    </td>
                                    <td>
                                        <strong>
                                            <span th:text="${payment.currency}"></span>
                                            <span
                                                th:text="${#numbers.formatDecimal(payment.amount, 0, 'COMMA', 2, 'POINT')}"></span>
                                        </strong>
                                    </td>
                                    <td>
                                        <span th:text="${payment.status}"></span>
                                        <br />
                                        <small th:if="${payment.isActive()}" class="text-muted">Activo</small>
                                    </td>
                                    <td>
                                        <small class="text-muted">
                                            <strong>ID:</strong>
                                            <span
                                                th:text="${payment.transactionId != null ? payment.transactionId : 'N/A'}"></span>
                                        </small>
                                        <br />
                                        <small class="text-muted" th:if="${payment.approvalCode != null}">
                                            <strong>Aprobación:</strong>
                                            <span th:text="${payment.approvalCode}"></span>
                                        </small>
                                    </td>
                                    <td>
                                        <span th:if="${payment.bankName != null}" th:text="${payment.bankName}"></span>
                                        <br />
                                        <small th:if="${payment.franchise != null}" class="text-muted">
                                            <span th:text="${payment.franchise}"></span>
                                        </small>
                                    </td>
                                    <td>
                                        <div th:if="${payment.validFrom != null}">
                                            <small class="text-muted">
                                                <span
                                                    th:text="${#temporals.format(payment.validFrom, 'dd/MM/yyyy')}"></span>
                                            </small>
                                            <br />
                                            <small class="text-muted">
                                                <span
                                                    th:text="${#temporals.format(payment.validUntil, 'dd/MM/yyyy')}"></span>
                                            </small>
                                        </div>
                                        <span th:unless="${payment.validFrom != null}" class="text-muted">N/A</span>
                                    </td>
                                    <td>
                                        <span class="text-muted small"
                                            th:text="${payment.createdAt != null ? #temporals.format(payment.createdAt, 'dd/MM/yyyy HH:mm') : 'N/A'}"></span>
                                    </td>
                                    <td class="text-center">
                                        <div
                                            class="table-actions d-flex align-items-center gap-2 justify-content-center">
                                            <button class="btn btn-action" title="Ver detalles"
                                                th:attr="data-payment-id=${payment.id}"
                                                onclick="viewPaymentDetails(this)" data-bs-toggle="modal"
                                                data-bs-target="#viewPaymentModal">
                                                <i class="bi bi-eye-fill"></i>
                                            </button>
                                            <button class="btn btn-action btnEditStatus" title="Cambiar estado"
                                                th:attr="data-payment-id=${payment.id},data-current-page=${currentPage},data-status-filter=${statusFilter},data-search-term=${searchTerm}">
                                                <i class="bi bi-pencil-fill"></i>
                                            </button>
                                            <form th:action="@{/admin/payments/delete/{id}(id=${payment.id})}"
                                                method="post" style="display:inline;">
                                                <input type="hidden" name="page" th:value="${currentPage}" />
                                                <input type="hidden" name="statusFilter" th:value="${statusFilter}" />
                                                <input type="hidden" name="search" th:value="${searchTerm}" />
                                                <button type="submit" class="btn btn-action" title="Eliminar"
                                                    onclick="return confirm('¿Eliminar este pago?')">
                                                    <i class="bi bi-trash-fill"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
                        <div class="pagination-info">
                            Mostrando <strong th:text="${payments.size()}"></strong> de
                            <strong th:text="${totalItems}"></strong> pagos
                        </div>

                        <nav th:if="${totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/payments(page=0, status=${statusFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-double-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/payments(page=${currentPage - 1}, status=${statusFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link"
                                        th:href="@{/admin/payments(page=${i}, status=${statusFilter}, search=${searchTerm})}"
                                        th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/payments(page=${currentPage + 1}, status=${statusFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/payments(page=${totalPages - 1}, status=${statusFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-double-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewPaymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Detalles del pago</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="paymentDetailsContent">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editStatusModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Cambiar estado del pago</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="editStatusForm" method="post">
                    <input type="hidden" name="page" id="currentPageInput" />
                    <input type="hidden" name="statusFilter" id="statusFilterInput" />
                    <input type="hidden" name="search" id="searchTermInput" />
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nuevo estado</label>
                            <select name="status" class="form-select" required>
                                <option value="ACCEPTED">Aceptado</option>
                                <option value="PENDING">Pendiente</option>
                                <option value="REJECTED">Rechazado</option>
                                <option value="FAILED">Fallido</option>
                            </select>
                        </div>
                        <div class="alert alert-warning">
                            <small>Cambiar el estado puede afectar el acceso del usuario a su plan.</small>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary-modal" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary-modal">Actualizar estado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/PaymentTable.js}"></script>
</body>

</html>
