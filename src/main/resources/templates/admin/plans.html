<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes - Dashboard</title>
    <link rel="icon" type="image/png" th:href="@{/img/icons/logo-fl.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin-table.css}">
</head>

<body>
    <th:block th:insert="~{fragments/navdashboard :: sidebar}"></th:block>

    <div class="main-content">
        <div class="container-fluid p-4">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <h1 class="page-title">Planes</h1>

            <div class="table-container">
                <div class="card-body">

                    <div class="d-flex justify-content-end mb-4">
                        <button class="btn btn-add-user" data-bs-toggle="modal" data-bs-target="#createPlanModal">
                            Nuevo plan
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-users align-middle">
                            <thead>
                                <tr>
                                    <th>Plan</th>
                                    <th>Precio</th>
                                    <th>Duración</th>
                                    <th>Badge</th>
                                    <th>Beneficios</th>
                                    <th>Registro</th>
                                    <th>Actualizado</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="plan : ${plans}">
                                    <td>
                                        <h6 class="mb-0" th:text="${plan.planName}"></h6>
                                    </td>
                                    <td>
                                        <strong>
                                            <span th:text="${plan.currency}"></span>
                                            <span
                                                th:text="${#numbers.formatDecimal(plan.price, 0, 'COMMA', 2, 'POINT')}"></span>
                                        </strong>
                                    </td>
                                    <td>
                                        <span th:text="${plan.durationDays}"></span> días
                                    </td>
                                    <td>
                                        <span th:text="${plan.badge}"></span>
                                    </td>
                                    <td>
                                        <button class="btn btn-action" th:attr="data-plan-id=${plan.id}"
                                            onclick="showBenefitsModal(this)" data-bs-toggle="modal"
                                            data-bs-target="#benefitsModal">
                                            Ver (<span
                                                th:text="${plan.benefits != null ? plan.benefits.size() : 0}"></span>)
                                        </button>
                                    </td>
                                    <td>
                                        <span class="text-muted small"
                                            th:text="${plan.createdAt != null ? #temporals.format(plan.createdAt, 'dd/MM/yyyy HH:mm') : 'Sin registro'}"></span>
                                    </td>
                                    <td>
                                        <span class="text-muted small"
                                            th:text="${plan.updatedAt != null ? #temporals.format(plan.updatedAt, 'dd/MM/yyyy HH:mm') : 'Nunca'}"></span>
                                    </td>
                                    <td class="text-center">
                                        <div
                                            class="table-actions d-flex align-items-center gap-2 justify-content-center">
                                            <button class="btn btn-action btnEditar" title="Editar"
                                                th:attr="data-plan-id=${plan.id}">
                                                <i class="bi bi-pencil-fill"></i>
                                            </button>
                                            <form th:action="@{/admin/plans/delete/{id}(id=${plan.id})}" method="post"
                                                style="display:inline;">
                                                <button type="submit" class="btn btn-action" title="Eliminar"
                                                    onclick="return confirm('¿Eliminar este plan?')">
                                                    <i class="bi bi-trash-fill"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
                        <div class="pagination-info">
                            Mostrando <strong th:text="${plans.size()}"></strong> de
                            <strong th:text="${totalItems}"></strong> planes
                        </div>

                        <nav th:if="${totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/plans(page=0)}">
                                        <i class="bi bi-chevron-double-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/plans(page=${currentPage - 1})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/admin/plans(page=${i})}" th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/plans(page=${currentPage + 1})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/plans(page=${totalPages - 1})}">
                                        <i class="bi bi-chevron-double-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createPlanModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Crear nuevo plan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/plans/create}" method="post">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre del plan *</label>
                                <input type="text" name="planName" class="form-control" required
                                    pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ0-9\s]{3,40}$"
                                    title="Debe tener entre 3 y 40 caracteres. Solo letras, números y espacios." />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio *</label>
                                <input type="number" name="price" step="0.01" class="form-control" required
                                    pattern="^[0-9]+(\.[0-9]{1,2})?$"
                                    title="Ingrese un precio válido. Ejemplos: 35000 o 35.50" />
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Moneda *</label>
                                <select name="currency" class="form-select" required>
                                    <option value="COP">COP</option>
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Duración (días) *</label>
                                <input type="number" name="durationDays" class="form-control" required min="2" max="3"
                                    pattern="^\d{2,3}$"
                                    title="Debe tener entre 2 y 3 dígitos (por ejemplo: 30, 60, 120)." />
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Badge *</label>
                                <select name="badge" class="form-select" required>
                                    <option value="Básico">Básico</option>
                                    <option value="Estándar">Estándar</option>
                                    <option value="Premium">Premium</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Beneficios (uno por línea) *</label>
                            <textarea name="benefitsText" class="form-control" rows="5"
                                placeholder="Ingrese cada beneficio en una línea nueva" required
                                pattern="^(?:[^\n]{3,100}\n?)+$"
                                title="Cada línea debe tener entre 3 y 100 caracteres."></textarea>
                            <small class="text-muted">Separe cada beneficio con un salto de línea</small>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary-modal" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary-modal">Crear plan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editPlanModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Editar plan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="editPlanForm" method="post">
                    <input type="hidden" id="editPlanId" name="id" />
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre del plan</label>
                                <input type="text" id="editPlanName" name="planName" class="form-control" required
                                    pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ0-9\s]{3,40}$"
                                    title="Debe tener entre 3 y 40 caracteres. Solo letras, números y espacios." />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio</label>
                                <input type="number" id="editPrice" name="price" step="0.01" class="form-control"
                                    required pattern="^[0-9]+(\.[0-9]{1,2})?$"
                                    title="Ingrese un precio válido. Ejemplos: 35000 o 35.50" />
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Moneda</label>
                                <select id="editCurrency" name="currency" class="form-select" required>
                                    <option value="COP">COP</option>
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Duración (días)</label>
                                <input type="number" id="editDurationDays" name="durationDays" class="form-control"
                                    required min="2" max="3" pattern="^\d{2,3}$"
                                    title="Debe tener entre 2 y 3 dígitos (por ejemplo: 30, 60, 120)." />
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Badge</label>
                                <select id="editBadge" name="badge" class="form-select" required>
                                    <option value="Básico">Básico</option>
                                    <option value="Estándar">Estándar</option>
                                    <option value="Premium">Premium</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Beneficios (uno por línea)</label>
                            <textarea id="editBenefitsText" name="benefitsText" class="form-control" rows="5"
                                placeholder="Ingrese cada beneficio en una línea nueva" required
                                pattern="^(?:[^\n]{3,100}\n?)+$"
                                title="Cada línea debe tener entre 3 y 100 caracteres."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary-modal" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary-modal">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="benefitsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Beneficios del plan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul id="benefitsList" class="list-group list-group-flush">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/PlanTable.js}"></script>
</body>

</html>
