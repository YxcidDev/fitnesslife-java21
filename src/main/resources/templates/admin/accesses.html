<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesos</title>
    <link rel="icon" type="image/png" th:href="@{/img/icons/logo-fl.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin-table.css}">
</head>

<body>
    <th:block th:insert="~{fragments/navdashboard :: sidebar}"></th:block>

    <div class="main-content">
        <div class="container-fluid p-4">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <h1 class="page-title">Accesos</h1>

            <div class="table-container">
                <div class="card-body">

                    <div class="d-flex align-items-center mb-4 flex-wrap gap-3">
                        <form method="get" action="/admin/accesses"
                            class="d-flex gap-2 flex-wrap align-items-center w-100">

                            <div class="position-relative search-input-wrapper">
                                <input type="text" name="search" class="form-control search-input"
                                    placeholder="Buscar por usuario, email, código QR..." th:value="${searchTerm}">
                            </div>

                            <select name="result" class="form-select filter-select">
                                <option value="">Todos los resultados</option>
                                <option value="ALLOWED" th:selected="${resultFilter == 'ALLOWED'}">Permitido</option>
                                <option value="DENIED" th:selected="${resultFilter == 'DENIED'}">Denegado</option>
                            </select>

                            <button type="submit" class="btn btn-filter">Filtrar</button>
                            <a th:href="@{/admin/accesses}" class="btn btn-clear">Limpiar</a>
                        </form>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-users align-middle">
                            <thead>
                                <tr>
                                    <th>Usuario</th>
                                    <th>Código QR</th>
                                    <th>Resultado</th>
                                    <th>Plan del usuario</th>
                                    <th>Fecha y hora</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="access : ${accesses}">
                                    <td>
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:src="|https://ui-avatars.com/api/?name=${access.user?.name != null ? access.user.name : 'N'}+${access.user?.lastname != null ? access.user.lastname : 'A'}&background=eb6608&color=fff&size=128|"
                                                alt="Avatar" class="user-avatar">
                                            <div>
                                                <p class="mb-0 fw-bold user-name"
                                                    th:text="${access.user.name} + ' ' + ${access.user.lastname}"></p>
                                                <small class="text-muted" th:text="${access.user.email}"></small>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span th:text="${access.qrCode != null ? access.qrCode : 'N/A'}"></span>
                                    </td>
                                    <td>
                                        <span th:text="${access.result.name() == 'ALLOWED'} ? 'Permitido' : 'Denegado'"></span>
                                    </td>
                                    <td>
                                        <span
                                            th:text="${access.user.plan != null ? access.user.plan : 'Sin plan'}"></span>
                                    </td>
                                    <td>
                                        <span class="text-muted small"
                                            th:text="${access.accessedAt != null ? #temporals.format(access.accessedAt, 'dd/MM/yyyy HH:mm:ss') : 'N/A'}"></span>
                                    </td>
                                    <td class="text-center">
                                        <div
                                            class="table-actions d-flex align-items-center gap-2 justify-content-center">
                                            <button class="btn btn-action" title="Ver detalles"
                                                th:attr="data-access-id=${access.id}" onclick="viewAccessDetails(this)"
                                                data-bs-toggle="modal" data-bs-target="#viewAccessModal">
                                                <i class="bi bi-eye-fill"></i>
                                            </button>
                                            <button class="btn btn-action btnEditAccess" title="Cambiar resultado"
                                                th:attr="data-access-id=${access.id},data-current-page=${currentPage},data-result-filter=${resultFilter},data-search-term=${searchTerm}">
                                                <i class="bi bi-pencil-fill"></i>
                                            </button>
                                            <form th:action="@{/admin/accesses/delete/{id}(id=${access.id})}"
                                                method="post" style="display:inline;">
                                                <input type="hidden" name="page" th:value="${currentPage}" />
                                                <input type="hidden" name="resultFilter" th:value="${resultFilter}" />
                                                <input type="hidden" name="search" th:value="${searchTerm}" />
                                                <button type="submit" class="btn btn-action" title="Eliminar"
                                                    onclick="return confirm('¿Eliminar este registro de acceso?')">
                                                    <i class="bi bi-trash-fill"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3">
                        <div class="pagination-info">
                            Mostrando <strong th:text="${accesses.size()}"></strong> de
                            <strong th:text="${totalItems}"></strong> accesos
                        </div>

                        <nav th:if="${totalPages > 1}">
                            <ul class="pagination mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/accesses(page=0, result=${resultFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-double-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/accesses(page=${currentPage - 1}, result=${resultFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link"
                                        th:href="@{/admin/accesses(page=${i}, result=${resultFilter}, search=${searchTerm})}"
                                        th:text="${i + 1}">1</a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/accesses(page=${currentPage + 1}, result=${resultFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link"
                                        th:href="@{/admin/accesses(page=${totalPages - 1}, result=${resultFilter}, search=${searchTerm})}">
                                        <i class="bi bi-chevron-double-right"></i>
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewAccessModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Detalles del acceso</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="accessDetailsContent">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editAccessModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content modal-bodytec">
                <div class="modal-header">
                    <h5 class="modal-title">Cambiar resultado del acceso</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="editAccessForm" method="post">
                    <input type="hidden" name="page" id="currentPageInput" />
                    <input type="hidden" name="resultFilter" id="resultFilterInput" />
                    <input type="hidden" name="search" id="searchTermInput" />
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nuevo resultado</label>
                            <select name="result" class="form-select" required>
                                <option value="ALLOWED">Permitido</option>
                                <option value="DENIED">Denegado</option>
                            </select>
                        </div>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <small>Este cambio es solo para fines de registro y no afecta el estado real del
                                usuario.</small>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary-modal" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary-modal">Actualizar resultado</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/AccessTable.js}"></script>
</body>

</html>
